name: Riavvia servizio su Koyeb

on:
  workflow_dispatch:     # Esegui manualmente
  # schedule:
  #   - cron: '0 4 * * *'   # scommenta se vuoi riavvio automatico (es. ogni giorno alle 4 UTC)

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installa Koyeb CLI (necessario per l'action successiva)
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_API_TOKEN }}

      - name: Riavvia / Redeploy servizio su Koyeb
        uses: koyeb/action-git-deploy@v1
        with:
          app-name: ${{ vars.KOYEB_APP_NAME }}      # es. myapp
          service-name: ${{ vars.KOYEB_SERVICE_NAME }}  # es. web oppure api
          # Opzionali utili:
          # deployment-strategy: rolling          # o blue-green se vuoi
          # wait: true
