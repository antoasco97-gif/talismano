name: Riavvia servizio su Koyeb

on:
  workflow_dispatch:           # Per eseguire manualmente
  schedule:
    - cron: '0 4 * * *'        # Esempio: ogni giorno alle 4:00 UTC

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installa Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_API_TOKEN }}

      - name: Riavvia il servizio (redeploy)
        run: |
          echo "🔄 Redeploy in corso di \( {{ vars.KOYEB_APP_NAME }}/ \){{ vars.KOYEB_SERVICE_NAME }} ..."
          koyeb redeploy \( {{ vars.KOYEB_APP_NAME }}/ \){{ vars.KOYEB_SERVICE_NAME }} --wait
